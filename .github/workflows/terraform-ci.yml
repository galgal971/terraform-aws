name: "Terraform CI"

# Trigger the pipeline on every git push to the main branch
on:
  push:
    branches:
      - main

jobs:
  terraform:
    name: "Verify Code and Preview Plan"
    runs-on: ubuntu-latest

    steps:
      # Step 1: Clone your repository code onto the runner
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      # Step 2: Install the correct version of Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: "1.15.4"

      # Step 3: Enforce clean code formatting rules
      - name: Terraform Format Check
        run: terraform fmt -check

      # Step 4: Initialize the directory (Reads from your S3 bucket backend!)
      - name: Terraform Init
        run: terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "us-east-1"

      # Step 5: Check for syntax validation mistakes
      - name: Terraform Validate
        run: terraform validate

      # Step 6: Safely preview infrastructure adjustments without modifying active hardware
      - name: Terraform Plan
        run: terraform plan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "us-east-1"

